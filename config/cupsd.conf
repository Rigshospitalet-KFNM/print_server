FROM ubuntu:24.04

ENV DEBIAN_FRONTEND=noninteractive

RUN apt-get update && apt-get install -y \
    cups \
    cups-client \
    cups-filters \
    ghostscript \
 && apt-get clean \
 && rm -rf /var/lib/apt/lists/*

# Copy only static configuration (safe to bake)
COPY config/cupsd.conf /etc/cups/cupsd.conf

# Ensure correct permissions baseline
RUN chown -R root:lp /etc/cups \
 && chmod 755 /etc/cups

# Expose CUPS web interface
EXPOSE 631

# Persist BOTH config and spool (critical)
VOLUME ["/etc/cups", "/var/spool/cups"]

# Run CUPS in foreground
CMD ["cupsd", "-f"]